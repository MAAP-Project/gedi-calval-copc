version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 30

  - package-ecosystem: conda
    directory: /
    schedule:
      interval: monthly
    groups:
      python-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 30

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: monthly
    groups:
      pre-commit:
        patterns:
          - "*"
    cooldown:
      default-days: 30
